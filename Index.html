<!DOCTYPE html>
<html>
<body>
    <h2>Login with Telegram</h2>
    
    <script async src="https://telegram.org/js/telegram-widget.js?22" 
            data-telegram-login="@Bakongapibydethbot" data-size="large" 
            data-onauth="onTelegramAuth(user)" data-request-access="write"></script>

    <div id="authSection" style="display:none; margin-top:20px;">
        <button onclick="sendCode()">Get My Code</button>
        
        <div id="verifyBox" style="display:none; margin-top:20px;">
            <input type="text" id="userInput" placeholder="Enter 6-digit code">
            <button onclick="verifyCode()">Verify & Login</button>
        </div>
    </div>

    <script>
      let userId = "";
      const apiBase = "https://pokey.onrender.com";

      function onTelegramAuth(user) {
        userId = user.id;
        document.getElementById("authSection").style.display = "block";
      }

      async function sendCode() {
        const res = await fetch(`${apiBase}/send-auth-code`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ recipient: userId, requestSecret: "Jyzel168169" })
        });
        if (res.ok) {
            alert("Code sent to Telegram!");
            document.getElementById("verifyBox").style.display = "block";
        }
      }

      async function verifyCode() {
        const userCode = document.getElementById("userInput").value;
        const res = await fetch(`${apiBase}/verify-code`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ recipient: userId, userCode: userCode })
        });
        const data = await res.json();
        alert(data.message);
        if(data.success) window.location.href = "/dashboard"; // Redirect on success
      }
    </script>
</body>
</html>
